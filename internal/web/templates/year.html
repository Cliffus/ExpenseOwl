<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/fa.min.css">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/pwa/icon-192.png">
    <link rel="stylesheet" href="/style.css">
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <title>ExpenseOwl Yearly Summary</title>
    <script src="/chart.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="nav-bar">
                <a href="/">
                    <img src="/pwa/icon-192.png" alt="ExpenseOwl Logo" height="85"
                        style="vertical-align: middle; margin-right: 20px;">
                </a>
                <a href="/" class="view-button" data-tooltip="Dashboard">
                    <i class="fa-solid fa-chart-pie"></i>
                </a>
                <a href="/table" class="view-button" data-tooltip="Table View">
                    <i class="fa-solid fa-table"></i>
                </a>
                <a href="/year" class="view-button active" data-tooltip="Yearly Summary">
                    <i class="fa-solid fa-calendar-days"></i>
                </a>
                <a href="/settings" class="view-button" data-tooltip="Settings">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </div>
        </header>

        <!-- Year navigation -->
        <div class="month-navigation">
            <button id="prevYear" class="nav-button"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="current-month" id="currentYear"></div>
            <button id="nextYear" class="nav-button"><i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <!-- No data message -->
        <div id="noDataMessage" class="no-data" style="display:none;">No expenses recorded this year.</div>

        <!-- Yearly cashflow summary cards -->
        <div id="cashflow-section" class="cashflow-container" style="display:none;">
            <div class="cashflow-item income">
                <div class="cashflow-label">Income</div>
                <div class="cashflow-value" id="cashflow-income"></div>
            </div>
            <div class="cashflow-item expenses">
                <div class="cashflow-label">Expenses</div>
                <div class="cashflow-value" id="cashflow-expenses"></div>
            </div>
            <div class="cashflow-item balance">
                <div class="cashflow-label">Balance</div>
                <div class="cashflow-value" id="cashflow-balance"></div>
            </div>
        </div>

        <!-- Monthly cashflow bar chart -->
        <div id="monthly-bar-section" class="chart-section-card" style="display:none;">
            <p class="section-title">Monthly Cashflow</p>
            <div class="year-bar-wrap">
                <canvas id="monthlyBarChart"></canvas>
            </div>
        </div>

        <!-- Category Spend Leaderboard Section -->
        <div id="category-leaderboard-section" class="chart-section-card" style="display:none;">
            <div class="leaderboard-header">
                <p class="section-title" style="margin-bottom: 0;">Category Spend Leaderboard</p>
                <select id="categoryLeaderboardLimit" class="nav-button"
                    style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">
                    <option value="10">Top 10</option>
                    <option value="15">Top 15</option>
                    <option value="20">Top 20</option>
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div id="categoryLeaderboardNoData" class="no-data"
                style="display:none; padding: 2rem; text-align: center;">
                No spending data found for this year.
            </div>
            <div id="categoryLeaderboardChartWrap" class="tag-leaderboard-chart-box">
                <canvas id="categoryLeaderboardChart"></canvas>
            </div>
            <div id="categoryLeaderboardList" class="tag-leaderboard-list"></div>
        </div>

        <!-- Tag Spend Leaderboard Section -->
        <div id="tag-leaderboard-section" class="chart-section-card" style="display:none; margin-top: 2rem;">
            <div class="leaderboard-header">
                <p class="section-title" style="margin-bottom: 0;">Tag Spend Leaderboard</p>
                <select id="tagLeaderboardLimit" class="nav-button"
                    style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">
                    <option value="10">Top 10</option>
                    <option value="15">Top 15</option>
                    <option value="20">Top 20</option>
                    <option value="all">All Tags</option>
                </select>
            </div>
            <div id="tagLeaderboardNoData" class="no-data" style="display:none; padding: 2rem; text-align: center;">
                No tagged spending data found for this year.
            </div>
            <div id="tagLeaderboardChartWrap" class="tag-leaderboard-chart-box">
                <canvas id="tagLeaderboardChart"></canvas>
            </div>
            <div id="tagLeaderboardList" class="tag-leaderboard-list"></div>
        </div>

    </div><!-- end .container -->

    <script src="/functions.js"></script>
    <script>
        let currentCurrency = 'usd';
        let startDate = 1;
        let currentYear = new Date().getFullYear();
        let allExpenses = [];
        let monthlyBarChart = null;
        let categoryLeaderboardChart = null;
        const categoryDetailCharts = new Map();
        let tagLeaderboardChart = null;
        const tagDetailCharts = new Map();
        let categoryColors = {};
        let tagColors = {};


        Chart.defaults.color = '#b3b3b3';
        Chart.defaults.borderColor = '#606060';
        Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

        function getYearExpenses(year) {
            return allExpenses.filter(e => {
                const d = new Date(e.date);
                return d.getFullYear() === year;
            });
        }

        function filterExpensesByYTD(expenses, year, monthLimit) {
            const now = new Date();
            const realWorldYear = now.getFullYear();
            if (year !== realWorldYear) return expenses;

            return expenses.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() <= monthLimit;
            });
        }

        function assignCategoryColors(categories) {
            categories.forEach((category, index) => {
                if (!categoryColors[category]) {
                    categoryColors[category] = colorPalette[index % colorPalette.length];
                }
            });
        }

        function assignTagColors(tags) {
            tags.forEach((tag, index) => {
                if (!tagColors[tag]) {
                    tagColors[tag] = colorPalette[(index) % colorPalette.length];
                }
            });
        }

        function updateCategoryLeaderboard(yearExp, prevYearExp, isYTD, monthLimit) {
            const currentYearExpenses = yearExp.filter(e => e.amount < 0);
            let previousYearExpenses = prevYearExp.filter(e => e.amount < 0);

            // 'Apples-to-apples' YTD comparison
            if (isYTD) {
                previousYearExpenses = previousYearExpenses.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() <= monthLimit;
                });
            }

            const getCategoryTotals = (expenses) => {
                const totals = {};
                expenses.forEach(e => {
                    totals[e.category] = (totals[e.category] || 0) + Math.abs(e.amount);
                });
                return totals;
            };

            const currCatTotals = getCategoryTotals(currentYearExpenses);
            const prevCatTotals = getCategoryTotals(previousYearExpenses);

            let sortedCats = Object.entries(currCatTotals).sort((a, b) => b[1] - a[1]);
            const limitVal = document.getElementById('categoryLeaderboardLimit').value;
            const limit = limitVal === 'all' ? sortedCats.length : parseInt(limitVal, 10);
            const topCats = sortedCats.slice(0, limit);

            const noDataMsg = document.getElementById('categoryLeaderboardNoData');
            const chartWrap = document.getElementById('categoryLeaderboardChartWrap');
            const listEl = document.getElementById('categoryLeaderboardList');
            const sectionEl = document.getElementById('category-leaderboard-section');

            if (currentYearExpenses.length === 0) {
                sectionEl.style.display = 'none';
                return;
            }

            sectionEl.style.display = 'block';

            if (topCats.length === 0) {
                chartWrap.style.display = 'none';
                listEl.style.display = 'none';
                noDataMsg.style.display = 'block';
                if (categoryLeaderboardChart) { categoryLeaderboardChart.destroy(); categoryLeaderboardChart = null; }
                return;
            }

            noDataMsg.style.display = 'none';
            chartWrap.style.display = 'block';
            listEl.style.display = 'flex';

            const hasPrevYearData = previousYearExpenses.length > 0;

            const leaderboardData = topCats.map(([category, amount], index) => {
                const prevAmount = prevCatTotals[category] || 0;
                let delta = 0;
                let deltaColorClass = 'neutral';
                let deltaArrow = '';
                let isNew = false;
                let showDelta = hasPrevYearData;

                if (hasPrevYearData) {
                    if (prevAmount > 0) {
                        delta = ((amount - prevAmount) / prevAmount) * 100;
                    } else if (amount > 0) {
                        isNew = true;
                    }
                }

                if (isNew) {
                    deltaColorClass = 'new';
                } else if (delta > 0.1) {
                    deltaColorClass = 'increase';
                    deltaArrow = '↑';
                } else if (delta < -0.1) {
                    deltaColorClass = 'decrease';
                    deltaArrow = '↓';
                }

                return { category, amount, delta, deltaColorClass, deltaArrow, isNew, showDelta, rank: index + 1 };
            });

            if (categoryLeaderboardChart) categoryLeaderboardChart.destroy();
            assignCategoryColors(leaderboardData.map(d => d.category));

            categoryLeaderboardChart = new Chart('categoryLeaderboardChart', {
                type: 'bar',
                data: {
                    labels: leaderboardData.map(d => d.category),
                    datasets: [{
                        data: leaderboardData.map(d => d.amount),
                        backgroundColor: leaderboardData.map(d => categoryColors[d.category] || '#ccc'),
                        borderColor: '#1a1a1a',
                        borderWidth: 1,
                        borderRadius: 4,
                        maxBarThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.raw)}`
                            }
                        }
                    },
                    scales: {
                        x: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } },
                        y: { ticks: { color: '#b3b3b3' } }
                    }
                }
            });

            // Clear detail charts
            categoryDetailCharts.forEach(chart => chart.destroy());
            categoryDetailCharts.clear();

            listEl.innerHTML = leaderboardData.map(d => `
                <div class="tag-leaderboard-item" data-category="${escapeHTML(d.category)}">
                    <div class="tag-leaderboard-row" onclick="toggleCategoryDetail(this)">
                        <div class="tag-info">
                            <span class="tag-rank">#${d.rank}</span>
                            <span class="tag-name">${escapeHTML(d.category)}</span>
                        </div>
                        <div class="tag-values">
                            <span class="tag-delta ${d.deltaColorClass}">
                                ${d.showDelta ? (d.isNew ? 'New' : `${d.deltaArrow} ${Math.abs(d.delta).toFixed(1)}%`) : ''}
                            </span>
                            <span class="tag-amount">${formatCurrency(d.amount)}</span>
                        </div>
                    </div>
                    <div class="tag-leaderboard-detail" style="display:none;"></div>
                </div>
            `).join('');
        }


        // ── Yearly cashflow summary ────────────────────────────────
        function updateYearlyCashflow(expenses) {
            const income = expenses.filter(e => e.amount > 0).reduce((s, e) => s + e.amount, 0);
            const expTotal = expenses.filter(e => e.amount < 0).reduce((s, e) => s + Math.abs(e.amount), 0);
            const balance = income - expTotal;

            document.getElementById('cashflow-income').textContent = formatCurrency(income);
            document.getElementById('cashflow-expenses').textContent = formatCurrency(expTotal);
            document.getElementById('cashflow-balance').textContent = formatCurrency(balance);
            const balEl = document.getElementById('cashflow-balance');
            balEl.classList.toggle('positive', balance >= 0);
            balEl.classList.toggle('negative', balance < 0);

            const section = document.getElementById('cashflow-section');
            section.style.display = expenses.length > 0 ? 'flex' : 'none';
        }

        // ── Monthly bar chart ──────────────────────────────────────
        function calculateMonthlyBars(expenses, year) {
            const now = new Date();
            const maxMonth = (year === now.getFullYear()) ? now.getMonth() : (year > now.getFullYear() ? -1 : 11);
            if (maxMonth === -1) return { income: [], expenses: [], balance: [], savingsRate: [] };

            const months = Array.from({ length: maxMonth + 1 }, (_, i) => i);
            const income = months.map(m =>
                expenses.filter(e => e.amount > 0 && new Date(e.date).getMonth() === m)
                    .reduce((s, e) => s + e.amount, 0)
            );
            const expenseArr = months.map(m =>
                expenses.filter(e => e.amount < 0 && new Date(e.date).getMonth() === m)
                    .reduce((s, e) => s + Math.abs(e.amount), 0)
            );
            const balanceArr = months.map((m, i) => income[i] - expenseArr[i]);
            const savingsRateArr = months.map((m, i) => {
                const inc = income[i];
                if (inc === 0) return 0;
                return ((inc - expenseArr[i]) / inc) * 100;
            });
            return { income, expenses: expenseArr, balance: balanceArr, savingsRate: savingsRateArr };
        }

        const MONTH_LABELS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function createMonthlyBarChart(data) {
            if (monthlyBarChart) { monthlyBarChart.destroy(); monthlyBarChart = null; }
            if (data.income.length === 0) return;

            const computedStyle = getComputedStyle(document.body);
            monthlyBarChart = new Chart('monthlyBarChart', {
                type: 'bar',
                data: {
                    labels: MONTH_LABELS.slice(0, data.income.length),
                    datasets: [
                        {
                            type: 'line',
                            label: 'Savings Rate',
                            data: data.savingsRate,
                            borderColor: 'rgba(255, 215, 0, 1)',
                            backgroundColor: 'rgba(255, 215, 0, 1)',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: false,
                            yAxisID: 'y1'
                        },
                        {
                            type: 'bar',
                            label: 'Income',
                            data: data.income,
                            backgroundColor: 'rgba(16, 185, 129, 0.7)', // Emerald Green
                            borderColor: 'rgba(16, 185, 129, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                            yAxisID: 'y'
                        },
                        {
                            type: 'bar',
                            label: 'Expenses',
                            data: data.expenses,
                            backgroundColor: 'rgba(244, 63, 94, 0.7)', // Coral Red
                            borderColor: 'rgba(244, 63, 94, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                            yAxisID: 'y'
                        },
                        {
                            type: 'bar',
                            label: 'Balance',
                            data: data.balance,
                            backgroundColor: 'rgba(59, 130, 246, 0.7)', // Blue
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                            yAxisID: 'y'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 14, padding: 12 } },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    if (ctx.dataset.label === 'Savings Rate') {
                                        return `Savings Rate: ${ctx.raw.toFixed(1)}%`;
                                    }
                                    return `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            beginAtZero: true,
                            ticks: { callback: v => formatCurrency(v) },
                            grid: { drawOnChartArea: true, color: 'rgba(128, 128, 128, 0.15)' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            beginAtZero: true,
                            ticks: { callback: v => `${v.toFixed(0)}%` },
                            grid: { drawOnChartArea: false },
                            title: {
                                display: true,
                                text: 'Savings Rate (%)',
                                color: '#b3b3b3'
                            }
                        }
                    }
                }
            });
        }

        // ── Generic doughnut builder ───────────────────────────────

        function toggleCategoryDetail(rowElement) {
            const itemElement = rowElement.closest('.tag-leaderboard-item');
            const category = itemElement.dataset.category;
            const detailElement = itemElement.querySelector('.tag-leaderboard-detail');
            const isExpanded = itemElement.classList.contains('expanded');

            if (isExpanded) {
                itemElement.classList.remove('expanded');
                detailElement.style.display = 'none';
                if (categoryDetailCharts.has(category)) {
                    categoryDetailCharts.get(category).destroy();
                    categoryDetailCharts.delete(category);
                }
                detailElement.innerHTML = '';
            } else {
                itemElement.classList.add('expanded');
                detailElement.style.display = 'block';
                renderCategoryDetail(category, detailElement);
            }
        }

        function renderCategoryDetail(category, container) {
            const now = new Date();
            const realWorldYear = now.getFullYear();
            const monthLimit = now.getMonth();

            // Apply YTD filter to drilldown if it is the current year
            const yearExpenses = filterExpensesByYTD(getYearExpenses(currentYear).filter(e => e.amount < 0 && e.category === category), currentYear, monthLimit);

            const tagTotals = { 'Untagged': 0 };

            yearExpenses.forEach(e => {
                const amount = Math.abs(e.amount);
                if (e.tags && e.tags.length > 0) {
                    e.tags.forEach(t => {
                        tagTotals[t] = (tagTotals[t] || 0) + amount;
                    });
                } else {
                    tagTotals['Untagged'] += amount;
                }
            });

            // Remove Untagged if 0
            if (tagTotals['Untagged'] === 0) delete tagTotals['Untagged'];

            const sortedEntries = Object.entries(tagTotals).sort((a, b) => b[1] - a[1]);
            const tags = sortedEntries.map(e => e[0]);
            assignTagColors(tags);

            const canvasId = `cat-chart-${category.replace(/\s+/g, '-')}`;
            const chartHeight = Math.max(60, sortedEntries.length * 45);

            container.innerHTML = `
                <div class="tag-detail-layout">
                    <div class="tag-detail-chart-container year-dynamic" style="height: ${chartHeight}px;">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                    <div class="tag-detail-list-container">
                        ${sortedEntries.map(([targetTag, amount]) => `
                            <div class="tag-detail-cat-row">
                                <div class="tag-detail-cat-label">
                                    <div class="color-box" style="background-color: ${targetTag === 'Untagged' ? '#606060' : (tagColors[targetTag] || '#ccc')}"></div>
                                    <span>${escapeHTML(targetTag)}</span>
                                </div>
                                <span class="tag-amount">${formatCurrency(amount)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const ctx = document.getElementById(canvasId);
            const detailChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedEntries.map(e => e[0]),
                    datasets: [{
                        data: sortedEntries.map(e => e[1]),
                        backgroundColor: sortedEntries.map(e => e[0] === 'Untagged' ? '#606060' : (tagColors[e[0]] || '#ccc')),
                        borderRadius: 4,
                        barThickness: 20,
                        maxBarThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => formatCurrency(ctx.raw) } }
                    },
                    scales: {
                        x: { beginAtZero: true, ticks: { display: false }, grid: { display: false } },
                        y: { ticks: { color: '#b3b3b3', font: { size: 10 } } }
                    }
                }
            });
            categoryDetailCharts.set(category, detailChart);
        }

        function updateTagLeaderboard(yearExp, prevYearExp, isYTD, monthLimit) {
            const currentTagExpenses = yearExp.filter(e => e.amount < 0 && e.tags && e.tags.length > 0);
            let previousYearExpenses = prevYearExp.filter(e => e.amount < 0 && e.tags && e.tags.length > 0);

            // 'Apples-to-apples' YTD comparison
            if (isYTD) {
                previousYearExpenses = previousYearExpenses.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() <= monthLimit;
                });
            }

            const getTagTotals = (expenses) => {
                const totals = {};
                expenses.forEach(e => {
                    e.tags.forEach(tag => {
                        totals[tag] = (totals[tag] || 0) + Math.abs(e.amount);
                    });
                });
                return totals;
            };

            const currentTotals = getTagTotals(currentTagExpenses);
            const prevTotals = getTagTotals(previousYearExpenses);

            const sectionEl = document.getElementById('tag-leaderboard-section');
            const noDataEl = document.getElementById('tag-leaderboard-noData');
            const chartWrapEl = document.getElementById('tag-leaderboard-chartWrap');
            const listEl = document.getElementById('tagLeaderboardList');

            if (Object.keys(currentTotals).length === 0) {
                document.getElementById('tagLeaderboardNoData').style.display = 'block';
                document.getElementById('tag-leaderboard-section').style.display = 'block';
                document.getElementById('tagLeaderboardChartWrap').style.display = 'none';
                listEl.innerHTML = '';
                return;
            }

            document.getElementById('tag-leaderboard-section').style.display = 'block';
            document.getElementById('tagLeaderboardNoData').style.display = 'none';
            document.getElementById('tagLeaderboardChartWrap').style.display = 'block';

            const hasPrevYearData = prevYearExp && prevYearExp.length > 0;
            let leaderboardData = Object.entries(currentTotals).map(([tag, amount], index) => {
                const prevAmount = prevTotals[tag] || 0;
                let delta = 0;
                let deltaColorClass = 'neutral';
                let deltaArrow = '';
                let isNew = false;
                let showDelta = hasPrevYearData;

                if (hasPrevYearData) {
                    if (prevAmount > 0) {
                        delta = ((amount - prevAmount) / prevAmount) * 100;
                    } else if (amount > 0) {
                        isNew = true;
                    }
                }

                if (isNew) {
                    deltaColorClass = 'new';
                } else if (delta > 0.1) {
                    deltaColorClass = 'increase';
                    deltaArrow = '↑';
                } else if (delta < -0.1) {
                    deltaColorClass = 'decrease';
                    deltaArrow = '↓';
                }

                return { tag, amount, delta, deltaColorClass, deltaArrow, isNew, showDelta, rank: index + 1, isYTD };
            });

            leaderboardData.sort((a, b) => b.amount - a.amount);
            const limit = document.getElementById('tagLeaderboardLimit').value;
            if (limit !== 'all') {
                leaderboardData = leaderboardData.slice(0, parseInt(limit));
            }

            leaderboardData = leaderboardData.map((d, index) => ({ ...d, rank: index + 1 }));

            if (tagLeaderboardChart) tagLeaderboardChart.destroy();
            assignTagColors(leaderboardData.map(d => d.tag));

            tagLeaderboardChart = new Chart('tagLeaderboardChart', {
                type: 'bar',
                data: {
                    labels: leaderboardData.map(d => d.tag),
                    datasets: [{
                        data: leaderboardData.map(d => d.amount),
                        backgroundColor: leaderboardData.map(d => tagColors[d.tag] || '#ccc'),
                        borderColor: '#1a1a1a',
                        borderWidth: 1,
                        borderRadius: 4,
                        maxBarThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => formatCurrency(ctx.raw) } }
                    },
                    scales: {
                        x: { beginAtZero: true, ticks: { display: false }, grid: { display: false } },
                        y: { ticks: { color: '#b3b3b3', font: { size: 10 } } }
                    }
                }
            });

            tagDetailCharts.forEach(chart => chart.destroy());
            tagDetailCharts.clear();

            listEl.innerHTML = leaderboardData.map(d => `
                <div class="tag-leaderboard-item" data-tag="${escapeHTML(d.tag)}">
                    <div class="tag-leaderboard-row" onclick="toggleTagDetail(this)">
                        <div class="tag-info">
                            <span class="tag-rank">#${d.rank}</span>
                            <span class="tag-name">${escapeHTML(d.tag)}</span>
                        </div>
                        <div class="tag-values">
                            <span class="tag-delta ${d.deltaColorClass}">
                                ${d.showDelta ? (d.isNew ? 'New' : `${d.deltaArrow} ${Math.abs(d.delta).toFixed(1)}%`) : ''}
                            </span>
                            <span class="tag-amount">${formatCurrency(d.amount)}</span>
                        </div>
                    </div>
                    <div class="tag-leaderboard-detail" style="display:none;"></div>
                </div>
            `).join('');
        }

        function toggleTagDetail(rowElement) {
            const itemElement = rowElement.closest('.tag-leaderboard-item');
            const tag = itemElement.dataset.tag;
            const detailElement = itemElement.querySelector('.tag-leaderboard-detail');
            const isExpanded = itemElement.classList.contains('expanded');

            if (isExpanded) {
                itemElement.classList.remove('expanded');
                detailElement.style.display = 'none';
                if (tagDetailCharts.has(tag)) {
                    tagDetailCharts.get(tag).destroy();
                    tagDetailCharts.delete(tag);
                }
                return;
            }

            itemElement.classList.add('expanded');
            detailElement.style.display = 'block';

            const now = new Date();
            const realWorldYear = now.getFullYear();
            const monthLimit = now.getMonth();

            // Apply YTD filter to drilldown if it is the current year
            const tagExp = filterExpensesByYTD(getYearExpenses(currentYear).filter(e => e.amount < 0 && e.tags && e.tags.includes(tag)), currentYear, monthLimit);

            const categoryTotals = {};
            tagExp.forEach(e => {
                categoryTotals[e.category] = (categoryTotals[e.category] || 0) + Math.abs(e.amount);
            });

            const sortedEntries = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
            const categories = sortedEntries.map(e => e[0]);
            assignCategoryColors(categories);

            const canvasId = `tag-detail-chart-${tag.replace(/\s+/g, '-')}`;

            detailElement.innerHTML = `
                <div class="tag-detail-layout">
                    <div class="tag-detail-chart-container">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                    <div class="tag-detail-list-container">
                        ${sortedEntries.map(([cat, amount]) => `
                            <div class="tag-detail-cat-row">
                                <div class="tag-detail-cat-label">
                                    <div class="tag-detail-dot" style="background-color: ${categoryColors[cat] || '#ccc'}"></div>
                                    <span>${escapeHTML(cat)}</span>
                                </div>
                                <span class="tag-amount">${formatCurrency(amount)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const ctx = document.getElementById(canvasId);
            const detailChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: sortedEntries.map(e => e[0]),
                    datasets: [{
                        data: sortedEntries.map(e => e[1]),
                        backgroundColor: sortedEntries.map(e => categoryColors[e[0]] || '#ccc'),
                        borderWidth: 1,
                        borderColor: '#1a1a1a'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${formatCurrency(ctx.raw)}` } }
                    }
                }
            });
            tagDetailCharts.set(tag, detailChart);
        }

        function updateYear() {
            const now = new Date();
            const realWorldMonthLimit = now.getMonth();
            const isYTD = currentYear === now.getFullYear();

            const yearExp = filterExpensesByYTD(getYearExpenses(currentYear), currentYear, realWorldMonthLimit);
            const prevYearExp = getYearExpenses(currentYear - 1);

            const hasData = yearExp.length > 0;
            const currentYearEl = document.getElementById('currentYear');
            currentYearEl.textContent = currentYear;

            // Disable nextYear button if we are at the current year
            document.getElementById('nextYear').disabled = currentYear >= now.getFullYear();

            document.getElementById('noDataMessage').style.display = hasData ? 'none' : 'block';
            document.getElementById('cashflow-section').style.display = hasData ? 'flex' : 'none';
            document.getElementById('monthly-bar-section').style.display = hasData ? 'block' : 'none';

            updateYearlyCashflow(yearExp);
            updateCategoryLeaderboard(yearExp, prevYearExp, isYTD, realWorldMonthLimit);
            updateTagLeaderboard(yearExp, prevYearExp, isYTD, realWorldMonthLimit);

            if (!hasData) return;

            // Monthly bar chart
            const barData = calculateMonthlyBars(yearExp, currentYear);
            createMonthlyBarChart(barData);
        }

        async function initialize() {
            try {
                const configRes = await fetch('/config');
                if (!configRes.ok) throw new Error('Failed to fetch config');
                const config = await configRes.json();
                currentCurrency = config.currency;
                startDate = config.startDate;

                const expRes = await fetch('/expenses');
                if (!expRes.ok) throw new Error('Failed to fetch expenses');
                const data = await expRes.json();
                allExpenses = Array.isArray(data) ? data : (data && Array.isArray(data.expenses) ? data.expenses : []);

                // Sync year from URL on initial load if present
                currentYear = getCurrentYearFromURL();
                document.getElementById('categoryLeaderboardLimit').addEventListener('change', updateCategoryLeaderboard);
                document.getElementById('tagLeaderboardLimit').addEventListener('change', updateTagLeaderboard);

                updateYear();
            } catch (err) {
                console.error('Failed to initialize yearly view:', err);
            }
        }

        function getCurrentYearFromURL() {
            const params = getURLParams();
            const currentRealYear = new Date().getFullYear();
            if (params.year && /^\d{4}$/.test(params.year)) {
                const year = parseInt(params.year);
                return year > currentRealYear ? currentRealYear : year;
            }
            return currentRealYear;
        }

        window.addEventListener('popstate', () => {
            currentYear = getCurrentYearFromURL();
            updateYear();
        });

        document.getElementById('prevYear').addEventListener('click', () => {
            currentYear--;
            updateURLParams({ year: currentYear });
            updateYear();
        });
        document.getElementById('nextYear').addEventListener('click', () => {
            currentYear++;
            updateURLParams({ year: currentYear });
            updateYear();
        });
        document.getElementById('categoryLeaderboardLimit').addEventListener('change', () => updateYear());
        document.getElementById('tagLeaderboardLimit').addEventListener('change', () => updateYear());

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
