<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/fa.min.css">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/pwa/icon-192.png">
    <link rel="stylesheet" href="/style.css">
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
    <title>ExpenseOwl Dashboard</title>
    <script src="/chart.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="nav-bar">
                <a href="/">
                    <img src="/pwa/icon-192.png" alt="ExpenseOwl Logo" height="85"
                        style="vertical-align: middle; margin-right: 20px;">
                </a>
                <a href="/" class="view-button active" data-tooltip="Dashboard">
                    <i class="fa-solid fa-chart-pie"></i>
                </a>
                <a href="/table" class="view-button" data-tooltip="Table View">
                    <i class="fa-solid fa-table"></i>
                </a>
                <a href="/year" class="view-button" data-tooltip="Yearly Summary">
                    <i class="fa-solid fa-calendar-days"></i>
                </a>
                <a href="/settings" class="view-button" data-tooltip="Settings">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </div>
        </header>

        <div class="month-navigation">
            <button id="prevMonth" class="nav-button"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="current-month" id="currentMonth"></div>
            <button id="nextMonth" class="nav-button"><i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <div class="table-controls">
            <button id="toggleExpenseFormBtn" class="nav-button"><i class="fa-solid fa-plus"></i> Add Expense</button>
        </div>

        <div id="addExpenseContainer" style="display: none;">
            <div class="form-container">
                <form id="expenseForm" class="expense-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" value="-" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">categories</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tags-input">Tags</label>
                        <div id="tags-input-container" class="tags-input-container">
                            <div id="selected-tags" class="selected-tags"></div>
                            <input type="text" id="tags-input" placeholder="(optional)">
                        </div>
                        <div id="tags-dropdown" class="tags-dropdown"></div>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" step="0.01" min="0.01" max="9000000000000000" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                        <script>
                            const today = new Date();
                            const year = today.getFullYear();
                            const month = String(today.getMonth() + 1).padStart(2, '0');
                            const day = String(today.getDate()).padStart(2, '0');
                            const formattedDate = `${year}-${month}-${day}`;
                            document.getElementById('date').value = formattedDate;
                        </script>
                    </div>

                    <div class="form-group form-group-checkbox">
                        <label for="reportGain">Report Gain</label>
                        <input type="checkbox" id="reportGain" class="styled-checkbox">
                    </div>

                    <button type="submit" class="nav-button">Add Expense</button>
                </form>
                <div id="formMessage" class="form-message"></div>
            </div>
        </div>

        <div id="cashflow-section" class="cashflow-container" style="margin-top: 1rem; margin-bottom: 1.0rem;">
            <div class="cashflow-item income">
                <div class="cashflow-label">Income</div>
                <div class="cashflow-value" id="cashflow-income"></div>
            </div>
            <div class="cashflow-item expenses">
                <div class="cashflow-label">Expenses</div>
                <div class="cashflow-value" id="cashflow-expenses"></div>
            </div>
            <div class="cashflow-item balance">
                <div class="cashflow-label">Balance</div>
                <div class="cashflow-value" id="cashflow-balance"></div>
            </div>
        </div>

        <!-- Cumulative Burn Rate Section -->
        <div id="burn-rate-section" class="chart-section-card">
            <p class="section-title">Cumulative Burn Rate</p>
            <div id="burnRateNoData" class="no-data" style="display:none; padding: 2rem; text-align: center;">
                No spending data for this month.
            </div>
            <div id="burnRateChartWrap" class="burn-rate-chart-box">
                <canvas id="burnRateChart"></canvas>
            </div>
        </div>

        <!-- Category Spend Leaderboard Section -->
        <div id="category-leaderboard-section" class="chart-section-card" style="display:none; margin-top: 2rem;">
            <div class="leaderboard-header">
                <p class="section-title" style="margin-bottom: 0;">Category Spend Leaderboard</p>
                <select id="categoryLeaderboardLimit" class="nav-button"
                    style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">
                    <option value="10">Top 10</option>
                    <option value="15">Top 15</option>
                    <option value="20">Top 20</option>
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div id="categoryLeaderboardNoData" class="no-data"
                style="display:none; padding: 2rem; text-align: center;">
                No spending data found for this month.
            </div>
            <div id="categoryLeaderboardChartWrap" class="tag-leaderboard-chart-box">
                <canvas id="categoryLeaderboardChart"></canvas>
            </div>
            <div id="categoryLeaderboardList" class="tag-leaderboard-list"></div>
        </div>

        <!-- Tag Spend Leaderboard Section -->
        <div id="tag-leaderboard-section" class="chart-section-card">
            <div class="leaderboard-header">
                <p class="section-title" style="margin-bottom: 0;">Tag Spend Leaderboard</p>
                <select id="tagLeaderboardLimit" class="nav-button"
                    style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">
                    <option value="10">Top 10</option>
                    <option value="15">Top 15</option>
                    <option value="20">Top 20</option>
                    <option value="all">All Tags</option>
                </select>
            </div>
            <div id="tagLeaderboardNoData" class="no-data" style="display:none; padding: 2rem; text-align: center;">
                No tagged spending found for this month.
            </div>
            <div id="tagLeaderboardChartWrap" class="tag-leaderboard-chart-box">
                <canvas id="tagLeaderboardChart"></canvas>
            </div>
            <div id="tagLeaderboardList" class="tag-leaderboard-list"></div>
        </div>

    </div><!-- end .container -->

    <script src="/functions.js"></script>
    <script>
        let currentCurrency = 'usd';
        let startDate = 1;
        let tagLeaderboardChart = null;
        let currentDate = new Date();
        let allExpenses = [];
        let allCategories = [];
        let disabledCategories = new Set();
        let disabledTags = new Set();
        let categoryColors = {};
        let tagColors = {};
        let categoryLeaderboardChart = null;
        let categoryDetailCharts = new Map();
        let allTags = new Set();
        let selectedTags = new Set();
        let tagDetailCharts = new Map();
        let burnRateChart = null;

        function assignCategoryColors(categories) {
            categories.forEach((category, index) => {
                if (!categoryColors[category]) {
                    categoryColors[category] = colorPalette[index % colorPalette.length];
                }
            });
        }

        function assignTagColors(tags) {
            tags.forEach((tag, index) => {
                if (!tagColors[tag]) {
                    tagColors[tag] = colorPalette[(index) % colorPalette.length];
                }
            });
        }

        function calculateIncome(expenses) {
            return expenses
                .filter(exp => exp.amount > 0)
                .reduce((sum, exp) => sum + exp.amount, 0);
        }

        function calculateExpenses(expenses) {
            return expenses
                .filter(exp => exp.amount < 0)
                .reduce((sum, exp) => sum + Math.abs(exp.amount), 0);
        }

        function updateChartAndData() {
            const monthExpenses = getMonthExpenses(allExpenses);
            const cashflowSection = document.getElementById('cashflow-section');
            const burnRateSection = document.getElementById('burn-rate-section');

            if (monthExpenses.length === 0) {
                cashflowSection.style.display = 'none';
                burnRateSection.style.display = 'none';
            } else {
                cashflowSection.style.display = 'flex';
                burnRateSection.style.display = 'block';

                updateCashflow(monthExpenses);
                updateCategoryLeaderboard();
                updateTagLeaderboard();
                updateBurnRateChart();
            }
        }

        function updateCashflow(expenses) {
            const income = calculateIncome(expenses);
            const expenseTotal = calculateExpenses(expenses);
            const balance = income - expenseTotal;

            document.getElementById('cashflow-income').textContent = formatCurrency(income);
            document.getElementById('cashflow-expenses').textContent = formatCurrency(expenseTotal);
            document.getElementById('cashflow-balance').textContent = formatCurrency(balance);

            const balanceElement = document.getElementById('cashflow-balance');
            if (balance >= 0) {
                balanceElement.classList.add('positive');
                balanceElement.classList.remove('negative');
            } else {
                balanceElement.classList.add('negative');
                balanceElement.classList.remove('positive');
            }
        }

        function updateBurnRateChart() {
            const bounds = getMonthBounds(currentDate);
            const expenses = getMonthExpenses(allExpenses).filter(e => e.amount < 0);

            const noDataMsg = document.getElementById('burnRateNoData');
            const chartWrap = document.getElementById('burnRateChartWrap');

            if (expenses.length === 0) {
                chartWrap.style.display = 'none';
                noDataMsg.style.display = 'block';
                if (burnRateChart) { burnRateChart.destroy(); burnRateChart = null; }
                return;
            }

            noDataMsg.style.display = 'none';
            chartWrap.style.display = 'block';

            // Generate all days in the current budget month range
            const start = new Date(bounds.start);
            const end = new Date(bounds.end);
            const days = [];
            let curr = new Date(start.getFullYear(), start.getMonth(), start.getDate());
            const targetEnd = new Date(end.getFullYear(), end.getMonth(), end.getDate());

            while (curr <= targetEnd) {
                days.push(new Date(curr));
                curr.setDate(curr.getDate() + 1);
            }

            // Calculate daily totals
            const dailyTotals = days.map(day => {
                const dayStart = new Date(day.getFullYear(), day.getMonth(), day.getDate());
                const dayEnd = new Date(day.getFullYear(), day.getMonth(), day.getDate(), 23, 59, 59, 999);
                return expenses.filter(e => {
                    const d = new Date(e.date);
                    return d >= dayStart && d <= dayEnd;
                }).reduce((sum, e) => sum + Math.abs(e.amount), 0);
            });

            // Calculate cumulative totals (carry-over logic is inherent in simple sum + previous)
            const cumulativeData = [];
            let runningTotal = 0;
            dailyTotals.forEach(val => {
                runningTotal += val;
                cumulativeData.push(runningTotal);
            });

            // Previous month calculation for budget threshold
            const { start: currentStart } = getMonthBounds(currentDate);
            const prevMonthDate = new Date(currentStart.getTime() - 1);
            const prevBounds = getMonthBounds(prevMonthDate);
            const prevExpenses = allExpenses.filter(e => {
                const d = new Date(e.date);
                return d >= prevBounds.start && d <= prevBounds.end && e.amount < 0;
            });
            const prevTotal = prevExpenses.reduce((sum, e) => sum + Math.abs(e.amount), 0);

            // Calculate current month's total income for 'Income Ceiling'
            const incomeTotal = getMonthExpenses(allExpenses)
                .filter(e => e.amount > 0)
                .reduce((sum, e) => sum + e.amount, 0);

            const labels = days.map(d => d.getDate());

            if (burnRateChart) { burnRateChart.destroy(); }

            const ctx = document.getElementById('burnRateChart').getContext('2d');
            burnRateChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Cumulative Spend',
                            data: cumulativeData,
                            borderColor: '#4ECDC4',
                            backgroundColor: 'rgba(78, 205, 196, 0.1)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                            borderWidth: 2
                        },
                        {
                            label: 'Prev. Month Total',
                            data: new Array(labels.length).fill(prevTotal),
                            borderColor: 'rgba(255, 107, 107, 0.5)',
                            borderDash: [5, 5],
                            pointRadius: 0,
                            fill: false,
                            borderWidth: 2
                        },
                        {
                            label: 'Income Ceiling',
                            data: new Array(labels.length).fill(incomeTotal),
                            borderColor: '#38B000',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            borderDash: []
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12, padding: 10 } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}`
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: (val) => formatCurrency(val) },
                            grid: { color: 'rgba(128, 128, 128, 0.1)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateTagLeaderboard() {
            const currMonthExp = getMonthExpenses(allExpenses).filter(e => e.amount < 0);
            const { start: currentStart } = getMonthBounds(currentDate);
            const prevMonthDate = new Date(currentStart.getTime() - 1);
            const { start: pStart, end: pEnd } = getMonthBounds(prevMonthDate);
            const prevMonthExp = allExpenses.filter(exp => {
                const d = new Date(exp.date);
                return d >= pStart && d <= pEnd && exp.amount < 0;
            });


            const getTagTotals = (expenses) => {
                const totals = {};
                expenses.forEach(e => {
                    if (e.tags) {
                        e.tags.forEach(t => {
                            totals[t] = (totals[t] || 0) + Math.abs(e.amount);
                        });
                    }
                });
                return totals;
            };

            const currTagTotals = getTagTotals(currMonthExp);
            const prevTagTotals = getTagTotals(prevMonthExp);

            let sortedTags = Object.entries(currTagTotals).sort((a, b) => b[1] - a[1]);
            const limitVal = document.getElementById('tagLeaderboardLimit').value;
            const limit = limitVal === 'all' ? sortedTags.length : parseInt(limitVal, 10);
            const topTags = sortedTags.slice(0, limit);

            const noDataMsg = document.getElementById('tagLeaderboardNoData');
            const chartWrap = document.getElementById('tagLeaderboardChartWrap');
            const listEl = document.getElementById('tagLeaderboardList');

            if (topTags.length === 0) {
                chartWrap.style.display = 'none';
                listEl.style.display = 'none';
                noDataMsg.style.display = 'block';
                if (tagLeaderboardChart) { tagLeaderboardChart.destroy(); tagLeaderboardChart = null; }
                return;
            }

            noDataMsg.style.display = 'none';
            chartWrap.style.display = 'block';
            listEl.style.display = 'flex';

            const leaderboardData = topTags.map(([tag, amount], index) => {
                const prevAmount = prevTagTotals[tag] || 0;
                let delta = 0;
                let deltaColorClass = 'neutral';
                let deltaArrow = '';

                if (prevAmount > 0) {
                    delta = ((amount - prevAmount) / prevAmount) * 100;
                } else if (amount > 0) {
                    delta = 100;
                }

                if (delta > 0.1) {
                    deltaColorClass = 'increase';
                    deltaArrow = '↑';
                } else if (delta < -0.1) {
                    deltaColorClass = 'decrease';
                    deltaArrow = '↓';
                }

                return { tag, amount, delta, deltaColorClass, deltaArrow, rank: index + 1 };
            });

            if (tagLeaderboardChart) tagLeaderboardChart.destroy();
            assignTagColors(leaderboardData.map(d => d.tag));

            tagLeaderboardChart = new Chart('tagLeaderboardChart', {
                type: 'bar',
                data: {
                    labels: leaderboardData.map(d => d.tag),
                    datasets: [{
                        data: leaderboardData.map(d => d.amount),
                        backgroundColor: leaderboardData.map(d => tagColors[d.tag] || '#ccc'),
                        borderColor: '#1a1a1a',
                        borderWidth: 1,
                        borderRadius: 4,
                        maxBarThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.raw)}`
                            }
                        }
                    },
                    scales: {
                        x: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } },
                        y: { ticks: { color: '#b3b3b3' } }
                    }
                }
            });

            // Clear all existing detail charts when the leaderboard is re-rendered
            tagDetailCharts.forEach(chart => chart.destroy());
            tagDetailCharts.clear();

            listEl.innerHTML = leaderboardData.map(d => `
                <div class="tag-leaderboard-item" data-tag="${escapeHTML(d.tag)}">
                    <div class="tag-leaderboard-row" onclick="toggleTagDetail(this)">
                        <div class="tag-info">
                            <span class="tag-rank">#${d.rank}</span>
                            <span class="tag-name">${escapeHTML(d.tag)}</span>
                        </div>
                        <div class="tag-values">
                            <span class="tag-delta ${d.deltaColorClass}">
                                ${d.deltaArrow} ${Math.abs(d.delta).toFixed(1)}%
                            </span>
                            <span class="tag-amount">${formatCurrency(d.amount)}</span>
                        </div>
                    </div>
                    <div class="tag-leaderboard-detail"></div>
                </div>
            `).join('');
        }

        function updateCategoryLeaderboard() {
            const monthExpenses = getMonthExpenses(allExpenses).filter(e => e.amount < 0);

            // Previous month's categories for MoM
            const { start: currentStart } = getMonthBounds(currentDate);
            const prevMonthDate = new Date(currentStart.getTime() - 1);
            const { start: pStart, end: pEnd } = getMonthBounds(prevMonthDate);
            const prevMonthExpenses = allExpenses.filter(exp => {
                const d = new Date(exp.date);
                return d >= pStart && d <= pEnd && exp.amount < 0;
            });

            const getCategoryTotals = (expenses) => {
                const totals = {};
                expenses.forEach(e => {
                    if (!disabledCategories.has(e.category)) {
                        totals[e.category] = (totals[e.category] || 0) + Math.abs(e.amount);
                    }
                });
                return totals;
            };

            const currCatTotals = getCategoryTotals(monthExpenses);
            const prevCatTotals = getCategoryTotals(prevMonthExpenses);

            let sortedCats = Object.entries(currCatTotals).sort((a, b) => b[1] - a[1]);
            const limitVal = document.getElementById('categoryLeaderboardLimit').value;
            const limit = limitVal === 'all' ? sortedCats.length : parseInt(limitVal, 10);
            const topCats = sortedCats.slice(0, limit);

            const noDataMsg = document.getElementById('categoryLeaderboardNoData');
            const chartWrap = document.getElementById('categoryLeaderboardChartWrap');
            const listEl = document.getElementById('categoryLeaderboardList');
            const sectionEl = document.getElementById('category-leaderboard-section');

            if (monthExpenses.length === 0) {
                sectionEl.style.display = 'none';
                return;
            }

            sectionEl.style.display = 'block';

            if (topCats.length === 0) {
                chartWrap.style.display = 'none';
                listEl.style.display = 'none';
                noDataMsg.style.display = 'block';
                if (categoryLeaderboardChart) { categoryLeaderboardChart.destroy(); categoryLeaderboardChart = null; }
                return;
            }

            noDataMsg.style.display = 'none';
            chartWrap.style.display = 'block';
            listEl.style.display = 'flex';

            const hasPrevMonthData = prevMonthExpenses.length > 0;

            const leaderboardData = topCats.map(([category, amount], index) => {
                const prevAmount = prevCatTotals[category] || 0;
                let delta = 0;
                let deltaColorClass = 'neutral';
                let deltaArrow = '';
                let isNew = false;
                let showDelta = hasPrevMonthData;

                if (hasPrevMonthData) {
                    if (prevAmount > 0) {
                        delta = ((amount - prevAmount) / prevAmount) * 100;
                    } else if (amount > 0) {
                        isNew = true;
                    }
                }

                if (isNew) {
                    deltaColorClass = 'new';
                } else if (delta > 0.1) {
                    deltaColorClass = 'increase';
                    deltaArrow = '▴';
                } else if (delta < -0.1) {
                    deltaColorClass = 'decrease';
                    deltaArrow = '▾';
                }

                return { category, amount, delta, deltaColorClass, deltaArrow, isNew, showDelta, rank: index + 1 };
            });

            if (categoryLeaderboardChart) categoryLeaderboardChart.destroy();
            assignCategoryColors(leaderboardData.map(d => d.category));

            categoryLeaderboardChart = new Chart('categoryLeaderboardChart', {
                type: 'bar',
                data: {
                    labels: leaderboardData.map(d => d.category),
                    datasets: [{
                        data: leaderboardData.map(d => d.amount),
                        backgroundColor: leaderboardData.map(d => categoryColors[d.category] || '#ccc'),
                        borderColor: '#1a1a1a',
                        borderWidth: 1,
                        borderRadius: 4,
                        maxBarThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.raw)}`
                            }
                        }
                    },
                    scales: {
                        x: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } },
                        y: { ticks: { color: '#b3b3b3' } }
                    }
                }
            });

            // Clear detail charts
            categoryDetailCharts.forEach(chart => chart.destroy());
            categoryDetailCharts.clear();

            listEl.innerHTML = leaderboardData.map(d => `
                <div class="tag-leaderboard-item" data-category="${escapeHTML(d.category)}">
                    <div class="tag-leaderboard-row" onclick="toggleCategoryDetail(this)">
                        <div class="tag-info">
                            <span class="tag-rank">#${d.rank}</span>
                            <span class="tag-name">${escapeHTML(d.category)}</span>
                        </div>
                        <div class="tag-values">
                            <span class="tag-delta ${d.deltaColorClass}">
                                ${d.showDelta ? (d.isNew ? 'New' : `${d.deltaArrow} ${Math.abs(d.delta).toFixed(1)}%`) : ''}
                            </span>
                            <span class="tag-amount">${formatCurrency(d.amount)}</span>
                        </div>
                    </div>
                    <div class="tag-leaderboard-detail" style="display:none;"></div>
                </div>
            `).join('');
        }

        function toggleCategoryDetail(rowElement) {
            const itemElement = rowElement.closest('.tag-leaderboard-item');
            const category = itemElement.dataset.category;
            const detailElement = itemElement.querySelector('.tag-leaderboard-detail');
            const isExpanded = itemElement.classList.contains('expanded');

            if (isExpanded) {
                itemElement.classList.remove('expanded');
                detailElement.style.display = 'none';
                if (categoryDetailCharts.has(category)) {
                    categoryDetailCharts.get(category).destroy();
                    categoryDetailCharts.delete(category);
                }
                detailElement.innerHTML = '';
            } else {
                itemElement.classList.add('expanded');
                detailElement.style.display = 'block';
                renderCategoryDetail(category, detailElement);
            }
        }

        function renderCategoryDetail(category, container) {
            const monthExpenses = getMonthExpenses(allExpenses).filter(e => e.amount < 0 && e.category === category);
            const tagTotals = { 'Untagged': 0 };

            monthExpenses.forEach(e => {
                const amount = Math.abs(e.amount);
                if (e.tags && e.tags.length > 0) {
                    e.tags.forEach(t => {
                        tagTotals[t] = (tagTotals[t] || 0) + amount;
                    });
                } else {
                    tagTotals['Untagged'] += amount;
                }
            });

            if (tagTotals['Untagged'] === 0) delete tagTotals['Untagged'];

            const sortedEntries = Object.entries(tagTotals).sort((a, b) => b[1] - a[1]);
            const tags = sortedEntries.map(e => e[0]);
            assignTagColors(tags);

            const canvasId = `cat-chart-${category.replace(/\s+/g, '-')}`;
            const chartHeight = Math.max(60, sortedEntries.length * 45);

            container.innerHTML = `
                <div class="tag-detail-layout">
                    <div class="tag-detail-chart-container year-dynamic" style="height: ${chartHeight}px;">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                    <div class="tag-detail-list-container">
                        ${sortedEntries.map(([targetTag, amount]) => `
                            <div class="tag-detail-cat-row">
                                <div class="tag-detail-cat-label">
                                    <div class="color-box" style="background-color: ${targetTag === 'Untagged' ? '#606060' : (tagColors[targetTag] || '#ccc')}"></div>
                                    <span>${escapeHTML(targetTag)}</span>
                                </div>
                                <span class="tag-amount">${formatCurrency(amount)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const ctx = document.getElementById(canvasId);
            const detailChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedEntries.map(e => e[0]),
                    datasets: [{
                        data: sortedEntries.map(e => e[1]),
                        backgroundColor: sortedEntries.map(e => e[0] === 'Untagged' ? '#606060' : (tagColors[e[0]] || '#ccc')),
                        borderRadius: 4,
                        barThickness: 20,
                        maxBarThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => formatCurrency(ctx.raw) } }
                    },
                    scales: {
                        x: { beginAtZero: true, ticks: { display: false }, grid: { display: false } },
                        y: { ticks: { color: '#b3b3b3', font: { size: 10 } } }
                    }
                }
            });
            categoryDetailCharts.set(category, detailChart);
        }

        function toggleTagDetail(rowElement) {
            const itemElement = rowElement.closest('.tag-leaderboard-item');
            const tag = itemElement.dataset.tag;
            const detailElement = itemElement.querySelector('.tag-leaderboard-detail');
            const isExpanded = itemElement.classList.contains('expanded');

            if (isExpanded) {
                // Collapse
                itemElement.classList.remove('expanded');
                detailElement.style.display = 'none';

                // Cleanup chart
                if (tagDetailCharts.has(tag)) {
                    tagDetailCharts.get(tag).destroy();
                    tagDetailCharts.delete(tag);
                }
                detailElement.innerHTML = '';
            } else {
                // Expand
                itemElement.classList.add('expanded');
                detailElement.style.display = 'block';
                renderTagDetail(tag, detailElement);
            }
        }

        function renderTagDetail(tag, container) {
            const monthExpenses = getMonthExpenses(allExpenses).filter(e => e.amount < 0);
            const tagExpenses = monthExpenses.filter(e => e.tags && e.tags.includes(tag));

            const categoryTotals = {};
            tagExpenses.forEach(e => {
                categoryTotals[e.category] = (categoryTotals[e.category] || 0) + Math.abs(e.amount);
            });

            const sortedEntries = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
            const labels = sortedEntries.map(e => e[0]);
            const data = sortedEntries.map(e => e[1]);
            const colors = labels.map(l => categoryColors[l] || '#ccc');

            const canvasId = `tag-chart-${tag.replace(/\s+/g, '-')}`;

            container.innerHTML = `
                <div class="tag-detail-layout">
                    <div class="tag-detail-chart-container">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                    <div class="tag-detail-list-container">
                        ${sortedEntries.map(([cat, amount]) => `
                            <div class="tag-detail-cat-row">
                                <div class="tag-detail-cat-label">
                                    <div class="color-box" style="background-color: ${categoryColors[cat] || '#ccc'}"></div>
                                    <span>${escapeHTML(cat)}</span>
                                </div>
                                <span class="tag-amount">${formatCurrency(amount)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const ctx = document.getElementById(canvasId).getContext('2d');
            const chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 1,
                        borderColor: '#081528' // Match background for separation
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            tagDetailCharts.set(tag, chart);
        }

        async function initialize() {
            try {
                const configResponse = await fetch('/config');
                if (!configResponse.ok) throw new Error('Failed to fetch configuration');
                const config = await configResponse.json();
                allCategories = config.categories;
                const categorySelect = document.getElementById('category');
                categorySelect.innerHTML = config.categories.map(cat =>
                    `<option value="${cat}">${cat}</option>`
                ).join('');
                currentCurrency = config.currency;
                startDate = config.startDate;

                const response = await fetch('/expenses');
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                allExpenses = Array.isArray(data) ? data : (data && Array.isArray(data.expenses) ? data.expenses : []);

                allTags.clear();
                allExpenses.forEach(exp => {
                    if (exp.tags) {
                        exp.tags.forEach(tag => allTags.add(tag));
                    }
                });

                // Sync month/year from URL on initial load if present
                currentDate = getCurrentDateFromURL();

                const uniqueCategories = [...new Set(allExpenses.map(exp => exp.category))];
                assignCategoryColors(uniqueCategories);

                updateMonthDisplay();
                updateChartAndData();
                setupTagInput();
            } catch (error) {
                console.error('Failed to initialize dashboard:', error);
            }
        }

        Chart.defaults.color = '#b3b3b3';
        Chart.defaults.borderColor = '#606060';
        Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

        function setupTagInput() {
            const container = document.getElementById('tags-input-container');
            const input = document.getElementById('tags-input');
            const dropdown = document.getElementById('tags-dropdown');
            const selectedContainer = document.getElementById('selected-tags');
            const formGroup = container.parentElement;

            const addTag = (tag) => {
                tag = tag.trim();
                if (tag && !selectedTags.has(tag)) {
                    selectedTags.add(tag);
                    const pill = document.createElement('div');
                    pill.className = 'tag-pill';
                    pill.textContent = tag;
                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove-tag';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = () => {
                        selectedTags.delete(tag);
                        pill.remove();
                    };
                    pill.appendChild(removeBtn);
                    selectedContainer.appendChild(pill);
                }
                input.value = '';
                dropdown.style.display = 'none';
            };

            input.addEventListener('focus', () => {
                dropdown.innerHTML = '';
                const availableTags = [...allTags].filter(tag => !selectedTags.has(tag));
                if (availableTags.length > 0) {
                    availableTags.forEach(tag => {
                        const item = document.createElement('div');
                        item.textContent = tag;
                        item.onclick = () => addTag(tag);
                        dropdown.appendChild(item);
                    });
                    dropdown.style.display = 'block';
                }
            });

            input.addEventListener('input', () => {
                const value = input.value.trim().toLowerCase();
                dropdown.innerHTML = '';
                const filteredTags = [...allTags].filter(tag => tag.toLowerCase().includes(value) && !selectedTags.has(tag));

                if (value && ![...allTags].map(t => t.toLowerCase()).includes(value)) {
                    const newItem = document.createElement('div');
                    newItem.textContent = `+ Create "${input.value.trim()}"`;
                    newItem.className = 'new-tag';
                    newItem.onclick = () => addTag(input.value.trim());
                    dropdown.appendChild(newItem);
                }

                filteredTags.forEach(tag => {
                    const item = document.createElement('div');
                    item.textContent = tag;
                    item.onclick = () => addTag(tag);
                    dropdown.appendChild(item);
                });

                dropdown.style.display = dropdown.children.length > 0 ? 'block' : 'none';
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (input.value.trim()) {
                        addTag(input.value.trim());
                    }
                }
            });

            container.addEventListener('click', () => input.focus());
            document.addEventListener('click', (e) => {
                if (!formGroup.contains(e.target)) {
                    dropdown.style.display = 'none';
                }
            });
        }

        document.getElementById('prevMonth').addEventListener('click', () => {
            const { start } = getMonthBounds(currentDate);
            currentDate = new Date(start.getTime() - 1);
            updateURLParams({
                year: currentDate.getFullYear(),
                month: String(currentDate.getMonth() + 1).padStart(2, '0')
            });
            updateMonthDisplay();
            updateChartAndData();
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            const { end } = getMonthBounds(currentDate);
            currentDate = new Date(end.getTime() + 1);
            updateURLParams({
                year: currentDate.getFullYear(),
                month: String(currentDate.getMonth() + 1).padStart(2, '0')
            });
            updateMonthDisplay();
            updateChartAndData();
        });

        function getCurrentDateFromURL() {
            const params = getURLParams();
            if (params.year && params.month && /^\d{4}$/.test(params.year) && /^\d{1,2}$/.test(params.month)) {
                const y = parseInt(params.year);
                const m = parseInt(params.month);
                return new Date(y, m - 1, 15);
            }
            return new Date();
        }

        window.addEventListener('popstate', () => {
            currentDate = getCurrentDateFromURL();
            updateMonthDisplay();
            updateChartAndData();
        });


        document.getElementById('categoryLeaderboardLimit').addEventListener('change', updateCategoryLeaderboard);
        document.getElementById('tagLeaderboardLimit').addEventListener('change', updateTagLeaderboard);

        document.getElementById('toggleExpenseFormBtn').addEventListener('click', function () {
            const formContainer = document.getElementById('addExpenseContainer');
            const isHidden = formContainer.style.display === 'none' || formContainer.style.display === '';

            if (isHidden) {
                formContainer.style.display = 'block';
                this.innerHTML = '<i class="fa-solid fa-times"></i> Close';
            } else {
                formContainer.style.display = 'none';
                this.innerHTML = '<i class="fa-solid fa-plus"></i> Add Expense';
            }
        });

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const isGain = document.getElementById('reportGain').checked;
            let amount = parseFloat(document.getElementById('amount').value);
            if (!isGain) {
                amount *= -1;
            }
            const formData = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                amount: amount,
                date: getISODateWithLocalTime(document.getElementById('date').value),
                tags: Array.from(selectedTags)
            };
            try {
                const response = await fetch('/expense', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const messageDiv = document.getElementById('formMessage');
                if (response.ok) {
                    messageDiv.textContent = 'Expense added successfully!';
                    messageDiv.className = 'form-message success';
                    document.getElementById('expenseForm').reset();
                    document.getElementById('selected-tags').innerHTML = '';
                    selectedTags.clear();
                    await initialize();
                    const today = new Date();
                    const year = today.getFullYear();
                    const month = String(today.getMonth() + 1).padStart(2, '0');
                    const day = String(today.getDate()).padStart(2, '0');
                    document.getElementById('date').value = `${year}-${month}-${day}`;
                } else {
                    const error = await response.json();
                    messageDiv.textContent = `Error: ${error.error || 'Failed to add expense'}`;
                    messageDiv.className = 'form-message error';
                }
                setTimeout(() => {
                    messageDiv.textContent = '';
                    messageDiv.className = 'form-message';
                }, 3000);
            } catch (error) {
                console.error('Error adding expense:', error);
                const messageDiv = document.getElementById('formMessage');
                messageDiv.textContent = 'Error: Failed to add expense';
                messageDiv.className = 'form-message error';
            }
        });
        document.addEventListener('DOMContentLoaded', initialize);

        document.getElementById('name').addEventListener('click', (e) => {
            if (e.target.value === '-') {
                e.target.value = '';
            }
        });
    </script>
</body>

</html>
